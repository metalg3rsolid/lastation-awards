<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résultats - La Station Awards</title>
  <link rel="stylesheet" href="/style.css">

  <style>
    .reveal-card{
      cursor:pointer;
      margin-bottom:20px;
      transition:.25s;
    }

    .reveal-card:hover{
      transform:translateY(-2px);
    }

    .winner-box{
      margin-top:16px;
      display:none;
    }

    .winner{
      display:flex;
      justify-content:space-between;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .winner:last-child{
      border-bottom:none;
    }

    .medal{
      margin-right:10px;
      font-size:20px;
    }

    .hidden-text{
      opacity:.7;
    }

    .big-title{
      text-align:center;
      margin-bottom:30px;
    }
  </style>
</head>
<body>

  <main class="shell">

    <section class="hero">
      <div class="badge">LA STATION AWARDS</div>
      <h1>🏆 Les Résultats</h1>
      <p>
        Clique sur une catégorie pour découvrir son vainqueur...
      </p>
    </section>

    <section id="resultsContainer"></section>

  </main>

  <script src="/resultat.js"></script>

</body>
</html>
