<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résultats - La Station Awards</title>
  <link rel="stylesheet" href="/style.css">

  <style>
    .result-card {
      cursor: pointer;
      overflow: hidden;
      transition: transform .25s ease, box-shadow .25s ease;
    }

    .result-card:hover {
      transform: translateY(-4px);
    }

    .winner-box {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all .45s ease;
      margin-top: 10px;
    }

    .winner-box.open {
      max-height: 300px;
      opacity: 1;
      animation: popReveal .45s ease;
    }

    @keyframes popReveal {
      0% {
        transform: scale(.95);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .winner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 2px solid rgba(255,255,255,.08);
      font-size: 20px;
      font-weight: 800;
    }

    .winner:last-child {
      border-bottom: none;
    }

    .medal {
      font-size: 28px;
      margin-right: 12px;
    }

    .winner-name {
      display: flex;
      align-items: center;
    }

    .winner-votes {
      color: #ffd84a;
    }

    .hint {
      opacity: .65;
      font-weight: 800;
      margin-top: 10px;
    }

    .hero-clean {
      position: relative;
    }

    .hero-clean .badge {
      display: none;
    }
  </style>
</head>

<body>
  <main class="shell">

    <section class="hero hero-clean">
      <h1>🏆 LES RÉSULTATS</h1>
      <p>Clique sur une catégorie pour découvrir son vainqueur...</p>
    </section>

    <section id="resultsContainer"></section>

  </main>

  <script src="/resultat.js"></script>
</body>
</html>
