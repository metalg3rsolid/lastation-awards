<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résultats - La Station Awards</title>
  <link rel="stylesheet" href="/style.css">

  <style>
    .hero-clean .badge {
      display: none;
    }

    .result-card {
      cursor: pointer;
      overflow: hidden;
      transition: .25s ease;
      margin-bottom: 20px;
    }

    .result-card:hover {
      transform: translateY(-4px);
    }

    .hint {
      opacity: .7;
      font-weight: 700;
      margin-top: 10px;
    }

    .winner-box {
      margin-top: 20px;
      max-height: 0;
      overflow: hidden;
      transition: .4s ease;
    }

    .winner-box.open {
      max-height: 600px;
    }

    .winner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-size: 20px;
      font-weight: 800;
    }

    .winner:last-child {
      border-bottom: none;
    }

    .winner-name {
      display: flex;
      align-items: center;
    }

    .winner-votes {
      color: #ffd84a;
      font-size: 18px;
    }

    .medal {
      font-size: 28px;
      margin-right: 12px;
    }

    .delayed-winner {
      opacity: 0;
      transform: translateY(18px) scale(.96);
    }

    .winner-box.open .delayed-winner {
      animation: revealWinner .55s ease forwards;
    }

    .winner-box.open .delay-0 {
      animation-delay: .25s;
    }

    .winner-box.open .delay-1 {
      animation-delay: 1.15s;
    }

    .winner-box.open .delay-2 {
      animation-delay: 2.05s;
    }

    @keyframes revealWinner {
      from {
        opacity: 0;
        transform: translateY(18px) scale(.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .glow-title {
      animation: glowPulse 2s infinite;
    }

    @keyframes glowPulse {
      0% {
        opacity: .7;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: .7;
      }
    }

  </style>
</head>

<body>

  <main class="shell">

    <section class="hero hero-clean">
      <h1 class="glow-title">🏆 LES RÉSULTATS OFFICIELS</h1>

      <p>
        Clique sur une catégorie... et découvre progressivement le top 3.
      </p>
    </section>

    <section id="resultsContainer"></section>

  </main>

  <script src="/resultat.js"></script>

</body>
</html>
